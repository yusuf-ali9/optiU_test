<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StreakBoard</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div class="container">
    <header>
      <div class="header-left">
        <h1>StreakBoard</h1>
        <span id="today-label" class="today-label"></span>
      </div>
    </header>

    <div id="loading" class="loading">Loading your dashboard...</div>

    <main id="main" style="display:none">

      <!-- Daily Goal -->
      <section class="section">
        <h2 class="section-title section-title--goal">Daily Goal</h2>
        <div id="daily-goal-list"></div>
      </section>

      <!-- Deep Work -->
      <section class="section">
        <h2 class="section-title section-title--deep">Deep Work</h2>
        <div id="deep-work-list"></div>
      </section>

      <!-- Habits -->
      <section class="section">
        <h2 class="section-title section-title--habit">Habits</h2>
        <div id="habits-list"></div>

        <div class="add-habit-area">
          <form id="add-habit-form" class="add-habit-form">
            <input
              type="text"
              id="new-habit-name"
              class="habit-input"
              placeholder="New habit name (e.g. Workout)"
              maxlength="80"
              autocomplete="off"
            />
            <button type="submit" class="btn btn--primary">+ Add Habit</button>
          </form>
        </div>
      </section>

      <!-- Weekly Summary -->
      <section class="section section--summary">
        <h2 class="section-title">This Week</h2>
        <div id="weekly-summary"></div>
        <div id="weekly-table-wrap"></div>
      </section>
    </main>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
