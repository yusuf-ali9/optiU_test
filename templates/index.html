<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StreakBoard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>

  <!-- Ambient background blobs -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <!-- Navigation -->
  <nav class="navbar">
    <div class="nav-brand">
      <span class="brand-glyph">⚡</span>
      <span class="brand-name">StreakBoard</span>
    </div>
    <div class="nav-tabs" role="tablist">
      <button class="nav-tab active" data-tab="home" role="tab">Home</button>
      <button class="nav-tab" data-tab="monthly" role="tab">Month View</button>
      <button class="nav-tab" data-tab="analytics" role="tab">6-Month Analytics</button>
    </div>
    <div class="nav-date" id="nav-date"></div>
  </nav>

  <!-- Main -->
  <main class="container">

    <div id="loading" class="loading-state">
      <div class="spinner"></div>
      <p>Loading your habits&hellip;</p>
    </div>

    <!-- HOME TAB -->
    <section id="tab-home" class="tab-panel active" role="tabpanel">
      <div id="sections-container"></div>

      <button class="add-section-btn" onclick="showModal('add-section-modal')">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M8 2v12M2 8h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        Add Section
      </button>

      <!-- Weekly snapshot -->
      <div class="weekly-panel" id="weekly-panel" style="display:none">
        <h2 class="panel-title">This Week</h2>
        <div id="stat-pills" class="stat-pills"></div>
        <div class="table-wrap">
          <table id="week-table" class="week-table"></table>
        </div>
      </div>
    </section>

    <!-- MONTHLY TAB -->
    <section id="tab-monthly" class="tab-panel" role="tabpanel">
      <div class="chart-hero">
        <h1 class="page-title">Monthly Overview</h1>
        <p class="page-subtitle">Habit completions across 4 weeks this month</p>
      </div>
      <div class="chart-card">
        <canvas id="monthly-chart"></canvas>
      </div>
    </section>

    <!-- 6-MONTH TAB -->
    <section id="tab-analytics" class="tab-panel" role="tabpanel">
      <div class="chart-hero">
        <h1 class="page-title">6-Month Analytics</h1>
        <p class="page-subtitle">Long-term habit trends by month</p>
      </div>
      <div class="chart-card">
        <canvas id="sixmonth-chart"></canvas>
      </div>
    </section>

  </main>

  <!-- Add Section Modal -->
  <div id="add-section-modal" class="modal-overlay" style="display:none">
    <div class="modal" role="dialog" aria-modal="true">
      <h3 class="modal-title">New Section</h3>
      <input id="new-section-name" class="modal-input" type="text"
             placeholder="e.g. Deep Work, Daily Goals, Other&hellip;" autocomplete="off" />
      <div class="modal-footer">
        <button class="btn-ghost" onclick="closeModal('add-section-modal')">Cancel</button>
        <button class="btn-primary" onclick="addSection()">Create</button>
      </div>
    </div>
  </div>

  <!-- Chatbot -->
  <button class="chat-fab" id="chat-fab" aria-label="Open StreakBot" onclick="toggleChat()">
    <span aria-hidden="true">💬</span>
  </button>

  <div id="chat-panel" class="chat-panel" style="display:none">
    <div class="chat-head">
      <div class="chat-title-row">
        <div class="chat-avatar">⚡</div>
        <span>StreakBot</span>
      </div>
      <button class="chat-close-btn" aria-label="Close chat" onclick="toggleChat()">&#x2715;</button>
    </div>
    <div id="chat-messages" class="chat-messages" aria-live="polite">
      <div class="bubble bot">Hey! I&rsquo;m StreakBot. Ask me anything about your habits and streaks 🚀</div>
    </div>
    <div class="chat-input-bar">
      <input id="chat-input" class="chat-input" type="text"
             placeholder="Ask about your habits&hellip;" autocomplete="off" />
      <button class="chat-send-btn" onclick="sendChat()">Send</button>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="/static/app.js"></script>
</body>
</html>
